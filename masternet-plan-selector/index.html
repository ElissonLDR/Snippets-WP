<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Masternet Plan Selector</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="mn-wrap" id="mn-plans-apps">

        <div class="mn-head">
            <h3 class="mn-title">Selecione o plano e escolha seus apps</h3>
            <p class="mn-sub">O botão do WhatsApp ativa quando você concluir as escolhas exigidas pelo plano.</p>
        </div>

        <div class="mn-plans" role="group" aria-label="Planos disponíveis"></div>

        <div class="mn-picker">

            <div class="mn-cat" data-cat="standard">
                <div class="mn-cat-head">
                    <span class="mn-dot mn-dot--std"></span>
                    <h4>Apps Standard</h4>
                    <div class="mn-quota-box"><small class="mn-quota" data-quota-for="standard"></small></div>
                </div>
                <div class="mn-apps mn-apps--standard"></div>
            </div>

            <div class="mn-cat" data-cat="advanced">
                <div class="mn-cat-head">
                    <span class="mn-dot mn-dot--adv"></span>
                    <h4>Apps Advanced</h4>
                    <div class="mn-quota-box"><small class="mn-quota" data-quota-for="advanced"></small></div>
                </div>
                <div class="mn-apps mn-apps--advanced"></div>
            </div>

            <div class="mn-cat" data-cat="premium">
                <div class="mn-cat-head">
                    <span class="mn-dot mn-dot--prm"></span>
                    <h4>Apps Premium</h4>
                    <div class="mn-quota-box"><small class="mn-quota" data-quota-for="premium"></small></div>
                </div>
                <div class="mn-apps mn-apps--premium"></div>
            </div>

        </div>

        <div class="mn-cta">
            <button type="button" class="mn-btn" id="mn-whats" disabled aria-disabled="true">
                Falar no WhatsApp
            </button>
            <p class="mn-hint" id="mn-status" aria-live="polite"></p>
        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
